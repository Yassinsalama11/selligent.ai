global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: chatorai-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:4000

  - job_name: chatorai-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9091

  - job_name: chatorai-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3001

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets:
          - tempo:3200

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
