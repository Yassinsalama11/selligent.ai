name: Widget Build

on:
  pull_request:
    paths:
      - 'airos/widget/**'
      - '.github/workflows/widget-build.yml'
  workflow_dispatch:

jobs:
  widget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: airos/widget/package-lock.json

      - name: Install dependencies
        working-directory: airos/widget
        run: npm install

      - name: Build widget
        working-directory: airos/widget
        run: npm run build

      - name: Verify artifact name
        run: test -f airos/widget/dist/widget.js
